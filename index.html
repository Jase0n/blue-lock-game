<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Blue Lock Impact 2026 — Все способности</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0a0a;
      overflow: hidden;
      font-family: 'Arial', sans-serif;
      user-select: none;
    }
    #gameContainer {
      position: relative;
      width: 100vw;
      height: 100vh;
    }
    canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
    }
    #menu {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    #menu h1 {
      color: #00ffff;
      font-size: 44px;
      margin-bottom: 10px;
      text-shadow: 0 0 20px rgba(0,255,255,0.5);
    }
    .subtitle {
      color: #aaa;
      font-size: 18px;
      margin-bottom: 25px;
    }
    .char-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      padding: 10px;
      max-width: 1200px;
    }
    .char-card {
      background: #111;
      border: 3px solid #333;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
      text-align: center;
    }
    .char-card:hover {
      border-color: #00ffff;
      transform: scale(1.02);
    }
    .char-card.selected {
      border-color: #ff3300;
      box-shadow: 0 0 20px rgba(255,51,0,0.4);
    }
    .char-card h3 {
      color: white;
      font-size: 18px;
      margin-bottom: 5px;
    }
    .char-card p {
      color: #888;
      font-size: 11px;
    }
    .btn {
      background: #00ffff;
      color: #000;
      padding: 12px 30px;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      margin: 8px;
      transition: 0.3s;
    }
    .btn:disabled {
      background: #222;
      color: #555;
      cursor: not-allowed;
    }
    #roomInfo {
      color: white;
      margin: 12px 0;
      display: flex;
      align-items: center;
      gap: 15px;
    }
    #copyBtn {
      background: #222;
      color: #00ffff;
      border: 1px solid #00ffff;
      padding: 5px 15px;
      border-radius: 4px;
      cursor: pointer;
    }
    #score {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 60px;
      font-weight: bold;
      z-index: 10;
      text-shadow: 0 0 20px black;
    }
  </style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  <div id="menu">
    <h1>BLUE LOCK IMPACT 2026</h1>
    <p class="subtitle">Выберите персонажа и создайте комнату</p>
    <div id="roomInfo" style="display:none;">
      <span>Комната: <span id="roomId" style="color:#00ffff;font-weight:bold;"></span></span>
      <button id="copyBtn">Копировать</button>
    </div>
    <div class="char-grid" id="charGrid"></div>
    <div id="playersList" style="color:#aaa;margin:12px 0;font-weight:bold;"></div>
    <div>
      <button class="btn" id="createRoomBtn">Создать комнату</button>
      <button class="btn" id="joinRoomBtn">Присоединиться</button>
      <input type="text" id="roomInput" placeholder="ID комнаты" style="padding:12px;background:#111;color:white;border:2px solid #333;border-radius:5px;width:140px;text-transform:uppercase;">
      <button class="btn" id="startGameBtn" disabled>Начать игру</button>
    </div>
  </div>
  <div id="score" style="display:none;">0 : 0</div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
  import { getDatabase, ref, set, onValue, update, get } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

  const firebaseConfig = {
    apiKey: "AIzaSyA2ozhqxlAM-_Hy9p0W3Vc4L-T83P4b3dM",
    authDomain: "bluelock-1d9bb.firebaseapp.com",
    databaseURL: "https://bluelock-1d9bb-default-rtdb.firebaseio.com",
    projectId: "bluelock-1d9bb",
    storageBucket: "bluelock-1d9bb.firebasestorage.app",
    messagingSenderId: "1021397810745",
    appId: "1:1021397810745:web:687341d15a647a25a997e8"
  };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const CHARACTERS = {
    Hulk: { name: "ХАЛК", color: "#2e7d32", baseRadius: 45, cd: 8, desc: "Гигантизм x2, отталкивание" },
    Isagi: { name: "ИСАГИ", color: "#0d47a1", baseRadius: 35, cd: 10, desc: "Мета-видение, щит, траектория" },
    Rin: { name: "РИН", color: "#4a148c", baseRadius: 35, cd: 10, desc: "Кручёные удары, увеличение ворот" },
    Pudge: { name: "ПУДЖ", color: "#4e342e", baseRadius: 40, cd: 7, desc: "Крюк, ROT-замедление" },
    Aiku: { name: "АЙКУ", color: "#1b5e20", baseRadius: 38, cd: 12, desc: "Телепорт к мячу, заморозка" },
    Kaiser: { name: "КАЙЗЕР", color: "#b71c1c", baseRadius: 36, cd: 10, desc: "Двойной рывок, мощный удар" },
    Nagi: { name: "НАГИ", color: "#ffffff", baseRadius: 37, cd: 12, desc: "Ловушка / 5-зарядный револьвер" },
    Dio: { name: "ДИО", color: "#ffd600", baseRadius: 38, cd: 20, desc: "THE WORLD / Checkmate ножи" },
    Naruto: { name: "НАРУТО", color: "#ff9800", baseRadius: 37, cd: 12, desc: "Каунтер, аура хвостов" },
    Maharaga: { name: "МАХАРАГА", color: "#9c27b0", baseRadius: 38, cd: 3, desc: "Адаптация: скорость/размер/рывок" }
  };

  let game = {
    roomId: null, playerId: null, selectedChar: null, started: false,
    canvas: null, ctx: null, keys: {},
    players: {
      player1: { x: 0, y: 0, angle: 0, radius: 35, speed: 11, dribbling: false, color: '#0d47a1', charType: 'Isagi', auraActive: false, cdUntil: 0, stunnedUntil: 0, skillTime: 0, skillType: "", nagiCharge: 0, dioKnives: 0, maharagaMode: 0 },
      player2: { x: 0, y: 0, angle: Math.PI, radius: 35, speed: 11, dribbling: false, color: '#b71c1c', charType: 'Isagi', auraActive: false, cdUntil: 0, stunnedUntil: 0, skillTime: 0, skillType: "", nagiCharge: 0, dioKnives: 0, maharagaMode: 0 }
    },
    gks: {
      blue: { y: window.innerHeight/2, radius: 30, color: '#29b6f6' },
      red: { y: window.innerHeight/2, radius: 30, color: '#ef5350' }
    },
    ball: { x: 0, y: 0, dx: 0, dy: 0, radius: 24, dribbler: null, curve: 0 },
    score: [0, 0],
    freezeUntil: 0,
    lastUpdate: 0
  };

  document.getElementById('copyBtn').onclick = () => {
    const rid = document.getElementById('roomId').textContent;
    if (rid) navigator.clipboard.writeText(rid).then(() => {
      const b = document.getElementById('copyBtn'); b.textContent = 'Скопировано!'; setTimeout(() => b.textContent = 'Копировать', 2000);
    });
  };

  function initMenu() {
    const grid = document.getElementById('charGrid');
    grid.innerHTML = '';
    for (const [key, c] of Object.entries(CHARACTERS)) {
      const card = document.createElement('div');
      card.className = 'char-card';
      card.innerHTML = `<h3>${c.name}</h3><p>${c.desc}</p>`;
      card.onclick = () => { document.querySelectorAll('.char-card').forEach(el=>el.classList.remove('selected')); card.classList.add('selected'); game.selectedChar = key; };
      grid.appendChild(card);
    }
    document.getElementById('createRoomBtn').onclick = createRoom;
    document.getElementById('joinRoomBtn').onclick = joinRoom;
    document.getElementById('startGameBtn').onclick = startGame;
  }

  async function createRoom() {
    if (!game.selectedChar) return alert('Выберите персонажа!');
    game.roomId = Math.random().toString(36).substring(2,8).toUpperCase();
    game.playerId = 'player1';
    await set(ref(db, `rooms/${game.roomId}`), {
      player1: { char: game.selectedChar, ready: true }, player2: null, status: 'waiting'
    });
    document.getElementById('roomId').textContent = game.roomId;
    document.getElementById('roomInfo').style.display = 'flex';
    document.getElementById('createRoomBtn').disabled = true;
    document.getElementById('joinRoomBtn').disabled = true;
    listenForOpponent(); listenForGameStart();
  }

  async function joinRoom() {
    if (!game.selectedChar) return alert('Выберите персонажа!');
    const rid = document.getElementById('roomInput').value.toUpperCase();
    if (!rid) return alert('Введите ID!');
    const snap = await get(ref(db, `rooms/${rid}`));
    if (!snap.exists()) return alert('Комната не найдена!');
    if (snap.val().player2) return alert('Комната заполнена!');
    game.roomId = rid; game.playerId = 'player2';
    await update(ref(db, `rooms/${rid}`), { 'player2': { char: game.selectedChar, ready: true }, status: 'ready' });
    document.getElementById('roomId').textContent = rid;
    document.getElementById('roomInfo').style.display = 'flex';
    document.getElementById('createRoomBtn').disabled = true;
    document.getElementById('joinRoomBtn').disabled = true;
    listenForGameStart();
  }

  function listenForOpponent() {
    onValue(ref(db, `rooms/${game.roomId}`), (snap) => {
      const d = snap.val();
      if (d && d.player2) { document.getElementById('startGameBtn').disabled = false; document.getElementById('playersList').textContent = 'Игрок 2 подключился!'; }
      else document.getElementById('playersList').textContent = 'Ожидание подключения...';
    });
  }

  function listenForGameStart() {
    onValue(ref(db, `rooms/${game.roomId}`), (snap) => {
      const d = snap.val();
      if (d && d.status === 'playing' && !game.started) {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('score').style.display = 'block';
        initGame(d);
      }
    });
  }

  async function startGame() {
    const snap = await get(ref(db, `rooms/${game.roomId}`));
    const rd = snap.val();
    const SW = window.innerWidth, SH = window.innerHeight;
    await update(ref(db, `rooms/${game.roomId}`), {
      status: 'playing',
      ball: { x: SW/2, y: SH/2, dx: 0, dy: 0, radius: 24, dribbler: null, curve: 0 },
      score: [0,0],
      gks: { blue: { y: SH/2 }, red: { y: SH/2 } },
      players: {
        player1: { x: SW*0.2, y: SH/2, angle:0, color:'#0d47a1', charType: rd.player1.char, radius: CHARACTERS[rd.player1.char].baseRadius, speed:11, dribbling:false, auraActive:false, cdUntil:0, stunnedUntil:0, skillTime:0, skillType:"", nagiCharge:0 },
        player2: { x: SW*0.8, y: SH/2, angle:Math.PI, color:'#b71c1c', charType: rd.player2.char, radius: CHARACTERS[rd.player2.char].baseRadius, speed:11, dribbling:false, auraActive:false, cdUntil:0, stunnedUntil:0, skillTime:0, skillType:"", nagiCharge:0 }
      }
    });
  }

  function initGame(data) {
    game.started = true;
    game.canvas = document.getElementById('gameCanvas');
    game.ctx = game.canvas.getContext('2d');
    game.canvas.width = window.innerWidth;
    game.canvas.height = window.innerHeight;
    game.ball = data.ball;
    game.score = data.score || [0,0];
    game.players.player1 = data.players.player1;
    game.players.player2 = data.players.player2;
    if (data.gks) { game.gks.blue.y = data.gks.blue.y; game.gks.red.y = data.gks.red.y; }
    setupControls();
    listenForGameUpdates();
    gameLoop();
  }

  function setupControls() {
    document.addEventListener('keydown', (e) => {
      game.keys[e.key] = true;
      if (e.key === ' ') handleKick();
      if (e.key === 'w' || e.key === 'W' || e.key === 'ц' || e.key === 'Ц' || e.key === 'ArrowUp') handleAbility();
    });
    document.addEventListener('keyup', (e) => { game.keys[e.key] = false; });
  }

  function handleAbility() {
    const p = game.players[game.playerId];
    if (!p || Date.now() < p.cdUntil || Date.now() < p.stunnedUntil || Date.now() < game.freezeUntil) return;
    const now = Date.now();
    p.cdUntil = now + CHARACTERS[p.charType].cd * 1000;
    p.auraActive = true;
    p.auraEndTime = now + 4000;
    p.skillTime = now;
    p.skillType = p.charType;

    if (p.charType === 'Hulk') { p.radius = CHARACTERS.Hulk.baseRadius * 2; }
    else if (p.charType === 'Aiku') {
      const ownHalf = game.playerId==='player1' ? game.ball.x < game.canvas.width/2 : game.ball.x > game.canvas.width/2;
      if (ownHalf) { p.x = game.ball.x; p.y = game.ball.y; game.freezeUntil = now + 2000; game.ball.dx = 0; game.ball.dy = 0; }
    } else if (p.charType === 'Dio') {
      if (p.dribbling) { game.freezeUntil = now + 3500; p.x -= Math.cos(p.angle)*60; p.y -= Math.sin(p.angle)*60; }
      else { game.freezeUntil = now + 5000; }
    } else if (p.charType === 'Nagi') {
      if (p.nagiCharge >= 1.0) { p.nagiCharge = 0; game.freezeUntil = now + 5000; }
      else if (p.nagiCharge >= 0.5) { p.nagiCharge -= 0.5; game.freezeUntil = now + 1500; }
    }
    updateGameState();
  }

  function handleKick() {
    const p = game.players[game.playerId];
    if (!p || !p.dribbling || Date.now() < game.freezeUntil) return;
    let power = 42;
    if (p.charType === 'Kaiser') power = 58;
    if (p.charType === 'Naruto' && p.auraActive) power = 62;
    if (p.charType === 'Dio' && p.auraActive) power = 75;
    if (p.charType === 'Nagi' && p.auraActive) power = 85;
    const kick = { dx: Math.cos(p.angle)*power, dy: Math.sin(p.angle)*power, curve: (p.charType==='Rin' && p.auraActive) ? -1.5 : 0 };
    p.dribbling = false;
    if (game.playerId === 'player1') { game.ball.dx = kick.dx; game.ball.dy = kick.dy; game.ball.curve = kick.curve; game.ball.dribbler = null; }
    else { p.kickIntent = kick; }
    updateGameState();
  }

  function updatePlayerPosition(player) {
    if (!player || Date.now() < player.stunnedUntil || Date.now() < game.freezeUntil) return;
    if (player.auraActive && Date.now() > player.auraEndTime) { player.auraActive = false; if (player.charType==='Hulk') player.radius = CHARACTERS.Hulk.baseRadius; }
    let sp = player.speed * (player.dribbling ? 0.75 : 1);
    if (player.auraActive && (player.charType==='Isagi'||player.charType==='Naruto'||player.charType==='Kaiser')) sp *= 1.6;
    if (game.keys['a'] || game.keys['ArrowLeft'] || game.keys['ф']) player.angle -= 0.1;
    if (game.keys['d'] || game.keys['ArrowRight'] || game.keys['в']) player.angle += 0.1;
    if (game.keys['w'] || game.keys['ArrowUp'] || game.keys['ц']) { player.x += Math.cos(player.angle)*sp; player.y += Math.sin(player.angle)*sp; }
    if (game.keys['s'] || game.keys['ArrowDown'] || game.keys['ы']) { player.x -= Math.cos(player.angle)*sp*0.6; player.y -= Math.sin(player.angle)*sp*0.6; }
    player.x = Math.max(player.radius, Math.min(game.canvas.width-player.radius, player.x));
    player.y = Math.max(player.radius, Math.min(game.canvas.height-player.radius, player.y));
  }

  function checkBallPickup(player, id) {
    if (!player || game.ball.dribbler || Date.now() < player.stunnedUntil) return;
    if (Math.hypot(player.x-game.ball.x, player.y-game.ball.y) < player.radius+game.ball.radius+12) {
      const opp = game.players[id==='player1'?'player2':'player1'];
      if (opp && opp.charType==='Naruto' && opp.auraActive) { player.stunnedUntil = Date.now()+1000; player.x -= Math.cos(player.angle)*120; player.y -= Math.sin(player.angle)*120; return; }
      player.dribbling = true; if (game.playerId==='player1') { game.ball.dribbler = id; game.ball.curve = 0; }
    }
  }

  function updateBallAndAI() {
    const ball = game.ball, now = Date.now();
    if (now < game.freezeUntil) return;
    if (ball.dribbler) {
      const h = game.players[ball.dribbler];
      if (h) { ball.x = h.x + Math.cos(h.angle)*(h.radius+ball.radius+2); ball.y = h.y + Math.sin(h.angle)*(h.radius+ball.radius+2); ball.dx=0; ball.dy=0; }
    } else if (game.playerId === 'player1') {
      const p2 = game.players.player2;
      if (p2 && p2.kickIntent) { ball.dx = p2.kickIntent.dx; ball.dy = p2.kickIntent.dy; ball.curve = p2.kickIntent.curve; ball.dribbler = null; delete p2.kickIntent; }
      if (ball.curve && Math.hypot(ball.dx, ball.dy)>1) { let a=Math.atan2(ball.dy,ball.dx)+ball.curve*0.03; let s=Math.hypot(ball.dx,ball.dy); ball.dx=Math.cos(a)*s; ball.dy=Math.sin(a)*s; ball.curve*=0.98; }
      ball.x += ball.dx; ball.y += ball.dy; ball.dx *= 0.98; ball.dy *= 0.98;
      const cy = game.canvas.height/2, gkL=220;
      game.gks.blue.y += ((ball.x<game.canvas.width/2 ? ball.y : cy) - game.gks.blue.y)*0.12;
      game.gks.red.y += ((ball.x>game.canvas.width/2 ? ball.y : cy) - game.gks.red.y)*0.12;
      game.gks.blue.y = Math.max(cy-gkL, Math.min(cy+gkL, game.gks.blue.y));
      game.gks.red.y = Math.max(cy-gkL, Math.min(cy+gkL, game.gks.red.y));
      if (Math.hypot(35-ball.x, game.gks.blue.y-ball.y) < game.gks.blue.radius+ball.radius) { ball.dx = Math.abs(ball.dx)*1.2+8; ball.curve=0; }
      if (Math.hypot(game.canvas.width-35-ball.x, game.gks.red.y-ball.y) < game.gks.red.radius+ball.radius) { ball.dx = -Math.abs(ball.dx)*1.2-8; ball.curve=0; }
      checkGoal();
    }
    if (ball.y < ball.radius) { ball.dy*=-1; ball.y=ball.radius; }
    if (ball.y > game.canvas.height-ball.radius) { ball.dy*=-1; ball.y=game.canvas.height-ball.radius; }
  }

  function checkGoal() {
    const gh=450, gy1=game.canvas.height/2-gh/2, gy2=game.canvas.height/2+gh/2;
    if (game.ball.y>=gy1 && game.ball.y<=gy2) {
      if (game.ball.x<15) { game.score[1]++; resetMatch(); }
      else if (game.ball.x>game.canvas.width-15) { game.score[0]++; resetMatch(); }
    }
  }

  function resetMatch() {
    const SW=game.canvas.width, SH=game.canvas.height;
    game.ball.x=SW/2; game.ball.y=SH/2; game.ball.dx=0; game.ball.dy=0; game.ball.dribbler=null; game.ball.curve=0;
    game.players.player1.x=SW*0.2; game.players.player1.y=SH/2; game.players.player1.angle=0; game.players.player1.dribbling=false; game.players.player1.auraActive=false;
    game.players.player2.x=SW*0.8; game.players.player2.y=SH/2; game.players.player2.angle=Math.PI; game.players.player2.dribbling=false; game.players.player2.auraActive=false;
    update(ref(db, `rooms/${game.roomId}`), { ball: game.ball, score: game.score, players: game.players });
  }

  function updateGameState() {
    if (!game.roomId) return;
    const p = game.players[game.playerId];
    if (game.playerId === 'player1') {
      update(ref(db, `rooms/${game.roomId}`), { 'players/player1': p, ball: game.ball, score: game.score, 'gks/blue/y': game.gks.blue.y, 'gks/red/y': game.gks.red.y });
    } else {
      update(ref(db, `rooms/${game.roomId}`), { 'players/player2': p });
    }
  }

  function listenForGameUpdates() {
    const oppId = game.playerId==='player1'?'player2':'player1';
    onValue(ref(db, `rooms/${game.roomId}`), (snap) => {
      const d = snap.val(); if (!d) return;
      if (d.score && (game.score[0]!==d.score[0]||game.score[1]!==d.score[1])) { game.score=d.score; document.getElementById('score').textContent=`${game.score[0]} : ${game.score[1]}`; }
      if (d.players && d.players[oppId]) game.players[oppId] = d.players[oppId];
      if (game.playerId==='player2' && d.ball) game.ball = d.ball;
      if (d.gks) { game.gks.blue.y = d.gks.blue.y; game.gks.red.y = d.gks.red.y; }
    });
  }

  function draw() {
    const ctx = game.ctx, cw=game.canvas.width, ch=game.canvas.height;
    if (!ctx) return;
    ctx.fillStyle='#007539'; ctx.fillRect(0,0,cw,ch);
    ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(cw/2,0); ctx.lineTo(cw/2,ch); ctx.stroke();
    ctx.beginPath(); ctx.arc(cw/2,ch/2,100,0,Math.PI*2); ctx.stroke();
    const gh=450, gy1=ch/2-gh/2;
    ctx.fillStyle='#1e88e5'; ctx.fillRect(0,gy1,20,gh);
    ctx.fillStyle='#e53935'; ctx.fillRect(cw-20,gy1,20,gh);
    ctx.fillStyle=game.gks.blue.color; ctx.beginPath(); ctx.arc(35, game.gks.blue.y, 30, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle=game.gks.red.color; ctx.beginPath(); ctx.arc(cw-35, game.gks.red.y, 30, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    for (const [id, p] of Object.entries(game.players)) {
      if (!p) continue;
      if (p.auraActive) { ctx.save(); ctx.strokeStyle='#00ffff'; ctx.lineWidth=4; ctx.shadowBlur=15; ctx.shadowColor='#00ffff'; ctx.beginPath(); ctx.arc(p.x,p.y,p.radius+8,0,Math.PI*2); ctx.stroke(); ctx.restore(); }
      ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.radius,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='#fff'; ctx.stroke();
      ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x+Math.cos(p.angle)*p.radius, p.y+Math.sin(p.angle)*p.radius); ctx.stroke();
      ctx.fillStyle='#fff'; ctx.font='bold 14px Arial'; ctx.textAlign='center'; ctx.fillText(CHARACTERS[p.charType].name, p.x, p.y-p.radius-12);
    }
    if (game.ball) { ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(game.ball.x, game.ball.y, game.ball.radius, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle='#000'; ctx.stroke(); }
  }

  function gameLoop() {
    if (!game.started) return;
    const my = game.players[game.playerId], opp = game.players[game.playerId==='player1'?'player2':'player1'];
    updatePlayerPosition(my); checkBallPickup(my, game.playerId); checkBallPickup(opp, game.playerId==='player1'?'player2':'player1');
    if (game.playerId==='player1' && opp && opp.dribbling) game.ball.dribbler = 'player2';
    if (my && !my.dribbling && game.ball.dribbler===game.playerId) game.ball.dribbler = null;
    updateBallAndAI(); draw();
    if (Date.now() - game.lastUpdate > 45) { updateGameState(); game.lastUpdate = Date.now(); }
    requestAnimationFrame(gameLoop);
  }

  initMenu();
</script>
