<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Lock - Multiplayer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        #menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        #menu h1 {
            color: #00ffff;
            font-size: 50px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        #menu .subtitle {
            color: #aaa;
            font-size: 20px;
            margin-bottom: 30px;
        }

        .char-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            padding: 10px;
            max-width: 1200px;
        }

        .char-card {
            background: #111;
            border: 3px solid #333;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.25s;
            text-align: center;
            min-width: 180px;
        }

        .char-card:hover {
            border-color: #00ffff;
            transform: scale(1.03);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }

        .char-card.selected {
            border-color: #ff3300;
            box-shadow: 0 0 20px rgba(255, 51, 0, 0.4);
        }

        .char-card h3 {
            color: white;
            font-size: 18px;
            margin-bottom: 6px;
        }

        .char-card p {
            color: #888;
            font-size: 11px;
            line-height: 1.3;
            white-space: pre-wrap;
        }

        .btn {
            background: #00ffff;
            color: #000;
            padding: 12px 35px;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #00cccc;
            transform: scale(1.05);
        }

        .btn:disabled {
            background: #222;
            color: #555;
            cursor: not-allowed;
            transform: none;
        }

        #roomInfo {
            color: white;
            font-size: 22px;
            margin: 15px 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #copyBtn {
            background: #222;
            color: #00ffff;
            border: 1px solid #00ffff;
            padding: 5px 15px;
            font-size: 15px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        #copyBtn:hover {
            background: #00ffff;
            color: #000;
        }

        #playersList {
            color: #aaa;
            margin: 15px 0;
            font-size: 18px;
            font-weight: bold;
        }

        #score {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 60px;
            font-weight: bold;
            z-index: 10;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="menu">
            <h1>BLUE LOCK IMPACT 2026</h1>
            <p class="subtitle">Выберите персонажа и создайте/подключитесь к комнате</p>
            
            <div id="roomInfo" style="display:none;">
                <span>Комната: <span id="roomId" style="color: #00ffff; font-weight: bold;"></span></span>
                <button id="copyBtn">Копировать</button>
            </div>
            
            <div class="char-grid" id="charGrid"></div>
            
            <div id="playersList"></div>
            
            <div>
                <button class="btn" id="createRoomBtn">Создать комнату</button>
                <button class="btn" id="joinRoomBtn">Присоединиться</button>
                <input type="text" id="roomInput" placeholder="ID комнаты" 
                       style="padding: 12px; font-size: 18px; border-radius: 5px; border: 2px solid #333; background: #111; color: white; margin: 10px; width: 160px; text-transform: uppercase;">
                <button class="btn" id="startGameBtn" disabled>Начать игру</button>
            </div>
        </div>
        <div id="score" style="display:none;">0 : 0</div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, set, onValue, update, get } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyA2ozhqxlAM-_Hy9p0W3Vc4L-T83P4b3dM",
            authDomain: "bluelock-1d9bb.firebaseapp.com",
            databaseURL: "https://bluelock-1d9bb-default-rtdb.firebaseio.com",
            projectId: "bluelock-1d9bb",
            storageBucket: "bluelock-1d9bb.firebasestorage.app",
            messagingSenderId: "1021397810745",
            appId: "1:1021397810745:web:687341d15a647a25a997e8",
            measurementId: "G-HFJ1F7DM4S"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById('copyBtn').onclick = function() {
            const roomId = document.getElementById('roomId').textContent;
            if (roomId) {
                navigator.clipboard.writeText(roomId).then(() => {
                    const btn = document.getElementById('copyBtn');
                    btn.textContent = 'Скопировано!';
                    setTimeout(() => btn.textContent = 'Копировать', 2000);
                });
            }
        };

        const CHARACTER_TYPES = {
            "Hulk": { name: "ХАЛК", base_radius: 45, desc: "Огромный размер\n\nСпособность делает его гигантом на время", cd: 8.0 },
            "Isagi": { name: "ИСАГИ", base_radius: 35, desc: "Мета-видение\n\nВидит траекторию мяча и получает суперскорость", cd: 10.0 },
            "Rin": { name: "РИН", base_radius: 35, desc: "Кручёные удары\n\nДает крученый эффект полета мяча при ударе", cd: 8.0 },
            "Pudge": { name: "ПУДЖ", base_radius: 40, desc: "Мясник\n\nПритягивает мяч к себе, если он близко", cd: 10.0 },
            "Aiku": { name: "АЙКУ", base_radius: 38, desc: "Расцветающий цветок\n\nТелепортируется к мячу в защите", cd: 15.0 },
            "Kaiser": { name: "КАЙЗЕР", base_radius: 36, desc: "Импакт Кайзера\n\nУсиленные мощные удары вперед", cd: 10.0 },
            "Nagi": { name: "НАГИ", base_radius: 37, desc: "Гений Ловушки\n\nМгновенная фиксация и остановка мяча", cd: 10.0 },
            "Dio": { name: "ДИО", base_radius: 38, desc: "THE WORLD\n\nЗамораживает соперника на расстоянии", cd: 20.0 },
            "Naruto": { name: "НАРУТО", base_radius: 37, desc: "Каунтер\n\nАура лиса: отталкивание врага при отборе", cd: 12.0 },
            "Maharaga": { name: "МАХАРАГА", base_radius: 38, desc: "Адаптация\n\nОглушает соперника в радиусе вокруг себя", cd: 15.0 }
        };

        let gameState = {
            roomId: null,
            playerId: null,
            selectedChar: null,
            gameStarted: false,
            canvas: null,
            ctx: null,
            keys: {},
            players: {},
            gks: {
                blue: { y: window.innerHeight / 2, radius: 30, color: '#29b6f6' },
                red: { y: window.innerHeight / 2, radius: 30, color: '#ef5350' }
            },
            ball: { x: 0, y: 0, dx: 0, dy: 0, radius: 24, dribbler: null, curve: 0 },
            score: [0, 0],
            lastUpdateTime: 0,
            particles: [],
            stealCooldowns: {}
        };

        function initMenu() {
            const charGrid = document.getElementById('charGrid');
            charGrid.innerHTML = '';
            
            for (const [key, char] of Object.entries(CHARACTER_TYPES)) {
                const card = document.createElement('div');
                card.className = 'char-card';
                card.innerHTML = `<h3>${char.name}</h3><p>${char.desc}</p>`;
                card.onclick = () => selectCharacter(key, card);
                charGrid.appendChild(card);
            }

            document.getElementById('createRoomBtn').onclick = createRoom;
            document.getElementById('joinRoomBtn').onclick = joinRoom;
            document.getElementById('startGameBtn').onclick = startGame;
        }

        function selectCharacter(charKey, cardElement) {
            document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
            cardElement.classList.add('selected');
            gameState.selectedChar = charKey;
        }

        async function createRoom() {
            if (!gameState.selectedChar) return alert('Выберите персонажа!');

            const roomId = Math.random().toString(36).substring(2, 8).toUpperCase();
            gameState.roomId = roomId;
            gameState.playerId = 'player1';

            const roomRef = ref(db, `rooms/${roomId}`);
            await set(roomRef, {
                player1: { char: gameState.selectedChar, ready: true },
                player2: null,
                status: 'waiting'
            });

            document.getElementById('roomId').textContent = roomId;
            document.getElementById('roomInfo').style.display = 'flex';
            document.getElementById('createRoomBtn').disabled = true;
            document.getElementById('joinRoomBtn').disabled = true;

            listenForOpponent();
            listenForGameStart();
        }

        async function joinRoom() {
            if (!gameState.selectedChar) return alert('Выберите персонажа!');

            const roomId = document.getElementById('roomInput').value.toUpperCase();
            if (!roomId) return alert('Введите ID комнаты!');

            const roomRef = ref(db, `rooms/${roomId}`);
            const snapshot = await get(roomRef);
            
            if (!snapshot.exists()) return alert('Комната не найдена!');
            if (snapshot.val().player2) return alert('Комната заполнена!');

            gameState.roomId = roomId;
            gameState.playerId = 'player2';

            await update(roomRef, {
                'player2': { char: gameState.selectedChar, ready: true },
                status: 'ready'
            });

            document.getElementById('roomId').textContent = roomId;
            document.getElementById('roomInfo').style.display = 'flex';
            document.getElementById('createRoomBtn').disabled = true;
            document.getElementById('joinRoomBtn').disabled = true;

            listenForGameStart();
        }

        function listenForOpponent() {
            const roomRef = ref(db, `rooms/${gameState.roomId}`);
            onValue(roomRef, (snapshot) => {
                const data = snapshot.val();
                if (data && data.player2) {
                    document.getElementById('startGameBtn').disabled = false;
                    document.getElementById('playersList').textContent = 'Игрок 2 подключился! Нажмите "Начать игру".';
                } else {
                    document.getElementById('playersList').textContent = 'Ожидание подключения Игрока 2...';
                }
            });
        }

        function listenForGameStart() {
            const roomRef = ref(db, `rooms/${gameState.roomId}`);
            onValue(roomRef, (snapshot) => {
                const data = snapshot.val();
                if (data && data.status === 'playing' && !gameState.gameStarted) {
                    document.getElementById('menu').style.display = 'none';
                    document.getElementById('score').style.display = 'block';
                    initGame(data);
                }
            });
        }

        async function startGame() {
            const roomRef = ref(db, `rooms/${gameState.roomId}`);
            const snapshot = await get(roomRef);
            const roomData = snapshot.val();

            const SW = window.innerWidth;
            const SH = window.innerHeight;

            await update(roomRef, {
                status: 'playing',
                ball: { x: SW / 2, y: SH / 2, dx: 0, dy: 0, radius: 24, dribbler: null, curve: 0 },
                score: [0, 0],
                gks: {
                    blue: { y: SH / 2 },
                    red: { y: SH / 2 }
                },
                players: {
                    player1: { x: SW * 0.2, y: SH / 2, angle: 0, color: '#0d47a1', charType: roomData.player1.char, radius: CHARACTER_TYPES[roomData.player1.char].base_radius, speed: 11, dribbling: false, auraActive: false, cdUntil: 0, stunnedUntil: 0, skillTime: 0, skillType: "", stealCooldown: 0, shieldActive: false, shieldEndTime: 0 },
                    player2: { x: SW * 0.8, y: SH / 2, angle: Math.PI, color: '#b71c1c', charType: roomData.player2.char, radius: CHARACTER_TYPES[roomData.player2.char].base_radius, speed: 11, dribbling: false, auraActive: false, cdUntil: 0, stunnedUntil: 0, skillTime: 0, skillType: "", stealCooldown: 0, shieldActive: false, shieldEndTime: 0 }
                }
            });
        }

        function initGame(roomData) {
            gameState.gameStarted = true;
            gameState.canvas = document.getElementById('gameCanvas');
            gameState.ctx = gameState.canvas.getContext('2d');
            gameState.canvas.width = window.innerWidth;
            gameState.canvas.height = window.innerHeight;
            
            gameState.ball = roomData.ball;
            gameState.score = roomData.score || [0, 0];
            gameState.players = roomData.players;
            gameState.stealCooldowns = {};
            gameState.particles = [];
            
            if (roomData.gks) {
                gameState.gks.blue.y = roomData.gks.blue.y;
                gameState.gks.red.y = roomData.gks.red.y;
            }

            setupControls();
            listenForGameUpdates();
            gameLoop();
        }

        function setupControls() {
            document.addEventListener('keydown', (e) => {
                gameState.keys[e.key] = true;
                if (e.key === ' ') {
                    e.preventDefault();
                    handleKick();
                }
                if (e.key === 'w' || e.key === 'W' || e.key === 'ц' || e.key === 'Ц') handleDash();
            });
            document.addEventListener('keyup', (e) => {
                gameState.keys[e.key] = false;
            });
        }

        function handleDash() {
            const player = gameState.players[gameState.playerId];
            if (!player) return;

            const now = Date.now();
            if (now < player.cdUntil || now < player.stunnedUntil) return;

            player.cdUntil = now + CHARACTER_TYPES[player.charType].cd * 1000;
            player.auraActive = true;
            player.auraEndTime = now + 3000;

            player.skillType = player.charType;
            player.skillTime = now;

            if (player.charType === 'Hulk') {
                player.radius = CHARACTER_TYPES.Hulk.base_radius * 1.6;
            } else if (player.charType === 'Aiku') {
                const isOwnHalf = gameState.playerId === 'player1' ? (gameState.ball.x < gameState.canvas.width / 2) : (gameState.ball.x > gameState.canvas.width / 2);
                if (isOwnHalf) {
                    player.x = gameState.ball.x - Math.cos(player.angle) * (player.radius + gameState.ball.radius + 15);
                    player.y = gameState.ball.y - Math.sin(player.angle) * (player.radius + gameState.ball.radius + 15);
                }
            } else if (player.charType === 'Isagi') {
                // Исаги: щит у ворот + ускорение
                player.shieldActive = true;
                player.shieldEndTime = now + 3000;
                // Если мяч рядом и свободен - забираем с эффектом
                if (!gameState.ball.dribbler && Math.hypot(player.x - gameState.ball.x, player.y - gameState.ball.y) < 200) {
                    player.dribbling = true;
                    gameState.ball.dribbler = gameState.playerId;
                    gameState.ball.dx = 0;
                    gameState.ball.dy = 0;
                    // Создаем частицы-пазлы
                    spawnPuzzleParticles(gameState.ball.x, gameState.ball.y);
                }
                player.x += Math.cos(player.angle) * 130;
                player.y += Math.sin(player.angle) * 130;
            } else if (player.charType !== 'Pudge' && player.charType !== 'Nagi' && player.charType !== 'Dio' && player.charType !== 'Maharaga') {
                player.x += Math.cos(player.angle) * 130;
                player.y += Math.sin(player.angle) * 130;
            }

            updateGameState();
        }

        function spawnPuzzleParticles(x, y) {
            const colors = ['#00ffff', '#448aff', '#00e5ff', '#40c4ff', '#80deea'];
            for (let i = 0; i < 20; i++) {
                const angle = (Math.PI * 2 * i) / 20;
                const speed = 3 + Math.random() * 5;
                gameState.particles.push({
                    x: x,
                    y: y,
                    dx: Math.cos(angle) * speed,
                    dy: Math.sin(angle) * speed,
                    life: 1.0,
                    decay: 0.02 + Math.random() * 0.03,
                    size: 8 + Math.random() * 12,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rotation: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 0.2
                });
            }
        }

        function handleKick() {
            const player = gameState.players[gameState.playerId];
            if (!player || !player.dribbling) return;

            let power = (player.charType === 'Kaiser' && player.auraActive) ? 56 : 39;
            
            const kickData = {
                dx: Math.cos(player.angle) * power,
                dy: Math.sin(player.angle) * power,
                curve: (player.charType === 'Rin' && player.auraActive) ? -1.8 : 0
            };

            player.dribbling = false;
            gameState.ball.dribbler = null;
            gameState.ball.dx = kickData.dx;
            gameState.ball.dy = kickData.dy;
            gameState.ball.curve = kickData.curve;

            updateGameState();
        }

        function attemptStealBall(stealer, victim, stealerId, victimId) {
            const now = Date.now();
            
            // Проверка кулдауна на отбор
            if (gameState.stealCooldowns[stealerId] && now < gameState.stealCooldowns[stealerId]) return;
            
            // Проверка что жертва не в иммунитете после отбора
            if (gameState.stealCooldowns[victimId] && now < gameState.stealCooldowns[victimId] && 
                gameState.stealCooldowns[victimId] - now > 700) return;
            
            // Дистанция для отбора
            const dist = Math.hypot(stealer.x - victim.x, stealer.y - victim.y);
            if (dist < stealer.radius + victim.radius + 15) {
                // Проверка Наруто контр-атаки
                if (victim.charType === 'Naruto' && victim.auraActive) {
                    stealer.stunnedUntil = now + 1000;
                    stealer.x -= Math.cos(stealer.angle) * 110;
                    stealer.y -= Math.sin(stealer.angle) * 110;
                    return;
                }

                // Отбор мяча
                victim.dribbling = false;
                stealer.dribbling = true;
                gameState.ball.dribbler = stealerId;
                
                // Установка кулдаунов
                gameState.stealCooldowns[stealerId] = now + 300; // 0.3с нельзя отобрать у отобравшего
                gameState.stealCooldowns[victimId] = now + 300; // 0.3с жертва не может отобрать обратно
                
                // Обновление позиции мяча
                gameState.ball.x = stealer.x + Math.cos(stealer.angle) * (stealer.radius + gameState.ball.radius + 2);
                gameState.ball.y = stealer.y + Math.sin(stealer.angle) * (stealer.radius + gameState.ball.radius + 2);
                gameState.ball.dx = 0;
                gameState.ball.dy = 0;
                gameState.ball.curve = 0;
            }
        }

        function updatePlayerPosition(player) {
            if (!player) return;
            const now = Date.now();
            if (now < player.stunnedUntil) return;

            // Проверка окончания щита Исаги
            if (player.shieldActive && now > player.shieldEndTime) {
                player.shieldActive = false;
            }

            if (player.auraActive && now > player.auraEndTime) {
                player.auraActive = false;
                if (player.charType === 'Hulk') player.radius = CHARACTER_TYPES.Hulk.base_radius;
                if (player.charType === 'Isagi') player.shieldActive = false;
            }

            let currentSpeed = player.speed * (player.dribbling ? 0.75 : 1);
            if (player.auraActive && (player.charType === 'Isagi' || player.charType === 'Naruto' || player.charType === 'Kaiser')) {
                currentSpeed *= 1.65;
            }

            if (gameState.keys['a'] || gameState.keys['ArrowLeft'] || gameState.keys['ф'] || gameState.keys['Ф']) player.angle -= 0.1;
            if (gameState.keys['d'] || gameState.keys['ArrowRight'] || gameState.keys['в'] || gameState.keys['В']) player.angle += 0.1;
            if (gameState.keys['w'] || gameState.keys['ArrowUp'] || gameState.keys['ц'] || gameState.keys['Ц']) {
                player.x += Math.cos(player.angle) * currentSpeed;
                player.y += Math.sin(player.angle) * currentSpeed;
            }
            if (gameState.keys['s'] || gameState.keys['ArrowDown'] || gameState.keys['ы'] || gameState.keys['Ы']) {
                player.x -= Math.cos(player.angle) * currentSpeed * 0.6;
                player.y -= Math.sin(player.angle) * currentSpeed * 0.6;
            }

            player.x = Math.max(player.radius, Math.min(gameState.canvas.width - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(gameState.canvas.height - player.radius, player.y));
        }

        function checkBallPickup(player, id) {
            if (!player || gameState.ball.dribbler) return;
            const now = Date.now();
            if (now < player.stunnedUntil) return;
            if (gameState.stealCooldowns[id] && now < gameState.stealCooldowns[id]) return;

            if (Math.hypot(player.x - gameState.ball.x, player.y - gameState.ball.y) < player.radius + gameState.ball.radius + 10) {
                player.dribbling = true;
                gameState.ball.dribbler = id;
                gameState.ball.dx = 0;
                gameState.ball.dy = 0;
                gameState.ball.curve = 0;
            }
        }

        function updateBallAndAI() {
            const ball = gameState.ball;
            if (!ball) return;

            // Проверка щита Исаги (только для player1 как хоста)
            if (gameState.playerId === 'player1') {
                const p1 = gameState.players.player1;
                const p2 = gameState.players.player2;
                
                // Щит Исаги для синих ворот
                if (p1 && p1.shieldActive) {
                    const blueGoalX = 50;
                    const blueGoalY1 = gameState.canvas.height / 2 - 225;
                    const blueGoalY2 = gameState.canvas.height / 2 + 225;
                    
                    if (ball.x < 100 && ball.y > blueGoalY1 - 50 && ball.y < blueGoalY2 + 50) {
                        if (ball.dx < 0) {
                            ball.dx *= -1.5;
                            ball.dy *= 0.5;
                            // Создаем частицы при блокировке
                            spawnPuzzleParticles(ball.x, ball.y);
                        }
                    }
                }
                
                // Щит Исаги для красных ворот
                if (p2 && p2.shieldActive) {
                    const redGoalX = gameState.canvas.width - 50;
                    const redGoalY1 = gameState.canvas.height / 2 - 225;
                    const redGoalY2 = gameState.canvas.height / 2 + 225;
                    
                    if (ball.x > gameState.canvas.width - 100 && ball.y > redGoalY1 - 50 && ball.y < redGoalY2 + 50) {
                        if (ball.dx > 0) {
                            ball.dx *= -1.5;
                            ball.dy *= 0.5;
                            spawnPuzzleParticles(ball.x, ball.y);
                        }
                    }
                }
            }

            if (ball.dribbler) {
                const holder = gameState.players[ball.dribbler];
                if (holder) {
                    ball.x = holder.x + Math.cos(holder.angle) * (holder.radius + ball.radius + 2);
                    ball.y = holder.y + Math.sin(holder.angle) * (holder.radius + ball.radius + 2);
                    ball.dx = 0;
                    ball.dy = 0;
                }
            } else {
                if (gameState.playerId === 'player1') {
                    const p2 = gameState.players.player2;
                    if (p2 && p2.kickIntent) {
                        ball.dx = p2.kickIntent.dx;
                        ball.dy = p2.kickIntent.dy;
                        ball.curve = p2.kickIntent.curve;
                        ball.dribbler = null;
                        delete p2.kickIntent;
                    }

                    if (ball.curve && Math.hypot(ball.dx, ball.dy) > 1) {
                        let angle = Math.atan2(ball.dy, ball.dx) + ball.curve * 0.03;
                        let speed = Math.hypot(ball.dx, ball.dy);
                        ball.dx = Math.cos(angle) * speed;
                        ball.dy = Math.sin(angle) * speed;
                        ball.curve *= 0.98;
                    }

                    ball.x += ball.dx;
                    ball.y += ball.dy;
                    ball.dx *= 0.98;
                    ball.dy *= 0.98;

                    // ИИ вратарей
                    const centerGoalY = gameState.canvas.height / 2;
                    const gkLimit = 220;

                    let targetYBlue = ball.y;
                    if (ball.x > gameState.canvas.width / 2) targetYBlue = centerGoalY;
                    gameState.gks.blue.y += (targetYBlue - gameState.gks.blue.y) * 0.12;
                    gameState.gks.blue.y = Math.max(centerGoalY - gkLimit, Math.min(centerGoalY + gkLimit, gameState.gks.blue.y));

                    let targetYRed = ball.y;
                    if (ball.x < gameState.canvas.width / 2) targetYRed = centerGoalY;
                    gameState.gks.red.y += (targetYRed - gameState.gks.red.y) * 0.12;
                    gameState.gks.red.y = Math.max(centerGoalY - gkLimit, Math.min(centerGoalY + gkLimit, gameState.gks.red.y));

                    if (Math.hypot(35 - ball.x, gameState.gks.blue.y - ball.y) < gameState.gks.blue.radius + ball.radius) {
                        ball.dx = Math.abs(ball.dx) * 1.2 + 8;
                        ball.curve = 0;
                    }
                    if (Math.hypot((gameState.canvas.width - 35) - ball.x, gameState.gks.red.y - ball.y) < gameState.gks.red.radius + ball.radius) {
                        ball.dx = -Math.abs(ball.dx) * 1.2 - 8;
                        ball.curve = 0;
                    }

                    checkGoal();
                }
            }

            // Отскоки от стен
            if (ball.y < ball.radius) { ball.dy *= -1; ball.y = ball.radius; }
            if (ball.y > gameState.canvas.height - ball.radius) { ball.dy *= -1; ball.y = gameState.canvas.height - ball.radius; }
            
            const goalHeight = 450;
            const goalY1 = gameState.canvas.height / 2 - goalHeight / 2;
            const goalY2 = gameState.canvas.height / 2 + goalHeight / 2;
            if (ball.y < goalY1 || ball.y > goalY2) {
                if (ball.x < ball.radius) { ball.dx *= -1; ball.x = ball.radius; }
                if (ball.x > gameState.canvas.width - ball.radius) { ball.dx *= -1; ball.x = gameState.canvas.width - ball.radius; }
            }
        }

        function checkGoal() {
            const ball = gameState.ball;
            const goalHeight = 450;
            const goalY1 = gameState.canvas.height / 2 - goalHeight / 2;
            const goalY2 = gameState.canvas.height / 2 + goalHeight / 2;

            if (ball.y >= goalY1 && ball.y <= goalY2) {
                if (ball.x < 15) {
                    gameState.score[1]++; // Красный забил
                    document.getElementById('score').textContent = `${gameState.score[0]} : ${gameState.score[1]}`;
                    resetMatchPositions();
                } else if (ball.x > gameState.canvas.width - 15) {
                    gameState.score[0]++; // Синий забил
                    document.getElementById('score').textContent = `${gameState.score[0]} : ${gameState.score[1]}`;
                    resetMatchPositions();
                }
            }
        }

        function resetMatchPositions() {
            const SW = gameState.canvas.width;
            const SH = gameState.canvas.height;

            gameState.ball.x = SW / 2;
            gameState.ball.y = SH / 2;
            gameState.ball.dx = 0;
            gameState.ball.dy = 0;
            gameState.ball.dribbler = null;
            gameState.ball.curve = 0;

            gameState.players.player1.x = SW * 0.2;
            gameState.players.player1.y = SH / 2;
            gameState.players.player1.angle = 0;
            gameState.players.player1.dribbling = false;
            gameState.players.player1.auraActive = false;
            gameState.players.player1.shieldActive = false;

            gameState.players.player2.x = SW * 0.8;
            gameState.players.player2.y = SH / 2;
            gameState.players.player2.angle = Math.PI;
            gameState.players.player2.dribbling = false;
            gameState.players.player2.auraActive = false;
            gameState.players.player2.shieldActive = false;

            gameState.stealCooldowns = {};

            const roomRef = ref(db, `rooms/${gameState.roomId}`);
            update(roomRef, {
                ball: gameState.ball,
                score: gameState.score,
                players: gameState.players
            });
        }

        function updateGameState() {
            if (!gameState.roomId) return;
            
            if (gameState.playerId === 'player1') {
                const updates = {
                    'players/player1': gameState.players.player1,
                    'ball': gameState.ball,
                    'score': gameState.score,
                    'gks/blue/y': gameState.gks.blue.y,
                    'gks/red/y': gameState.gks.red.y
                };
                update(ref(db, `rooms/${gameState.roomId}`), updates);
            } else {
                const updates = {
                    'players/player2': gameState.players.player2
                };
                update(ref(db, `rooms/${gameState.roomId}`), updates);
            }
        }

        function listenForGameUpdates() {
            const roomRef = ref(db, `rooms/${gameState.roomId}`);
            const oppId = gameState.playerId === 'player1' ? 'player2' : 'player1';

            onValue(roomRef, (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                if (data.score && (gameState.score[0] !== data.score[0] || gameState.score[1] !== data.score[1])) {
                    gameState.score = data.score;
                    document.getElementById('score').textContent = `${gameState.score[0]} : ${gameState.score[1]}`;
                    if (data.players) {
                        gameState.players.player1 = data.players.player1;
                        gameState.players.player2 = data.players.player2;
                    }
                    gameState.ball = data.ball;
                    return;
                }

                if (data.players && data.players[oppId]) {
                    const oldOpp = gameState.players[oppId];
                    const newOpp = data.players[oppId];
                    
                    if (newOpp.skillTime && (!oldOpp || oldOpp.skillTime !== newOpp.skillTime)) {
                        const now = Date.now();
                        if (newOpp.skillType === 'Dio') {
                            gameState.players[gameState.playerId].stunnedUntil = now + 3000;
                        } else if (newOpp.skillType === 'Maharaga') {
                            if (Math.hypot(gameState.players[gameState.playerId].x - newOpp.x, gameState.players[gameState.playerId].y - newOpp.y) < 300) {
                                gameState.players[gameState.playerId].stunnedUntil = now + 2000;
                            }
                        } else if (newOpp.skillType === 'Isagi') {
                            // При активации Исаги оппонентом создаем частицы
                            if (!gameState.ball.dribbler) {
                                spawnPuzzleParticles(gameState.ball.x, gameState.ball.y);
                            }
                        }
                        
                        if (gameState.playerId === 'player1') {
                            if (newOpp.skillType === 'Pudge' && !gameState.ball.dribbler) {
                                if (Math.hypot(newOpp.x - gameState.ball.x, newOpp.y - gameState.ball.y) < 350) {
                                    gameState.ball.x = newOpp.x;
                                    gameState.ball.y = newOpp.y;
                                    gameState.ball.dribbler = 'player2';
                                    newOpp.dribbling = true;
                                }
                            } else if (newOpp.skillType === 'Nagi' && !gameState.ball.dribbler) {
                                if (Math.hypot(newOpp.x - gameState.ball.x, newOpp.y - gameState.ball.y) < 250) {
                                    gameState.ball.dx = 0;
                                    gameState.ball.dy = 0;
                                    gameState.ball.dribbler = 'player2';
                                    newOpp.dribbling = true;
                                }
                            }
                        }
                    }
                    gameState.players[oppId] = newOpp;
                }

                if (gameState.playerId === 'player2') {
                    if (data.ball) gameState.ball = data.ball;
                    if (data.gks) {
                        gameState.gks.blue.y = data.gks.blue.y;
                        gameState.gks.red.y = data.gks.red.y;
                    }
                } else {
                    if (data.ball && data.ball.dribbler === 'player2') {
                        gameState.ball.dribbler = 'player2';
                    }
                }
            });
        }

        function draw() {
            const ctx = gameState.ctx;
            const canvas = gameState.canvas;
            if (!ctx) return;

            // Синий фильтр для Исаги
            const player = gameState.players[gameState.playerId];
            if (player && player.auraActive && player.charType === 'Isagi') {
                ctx.fillStyle = 'rgba(0, 100, 255, 0.15)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = '#007539';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // Если нет фильтра Исаги, рисуем обычное поле
            if (!(player && player.auraActive && player.charType === 'Isagi')) {
                ctx.fillStyle = '#007539';
            }

            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height / 2, 100, 0, Math.PI * 2);
            ctx.stroke();

            const goalHeight = 450;
            const goalY1 = canvas.height / 2 - goalHeight / 2;
            ctx.fillStyle = '#1e88e5';
            ctx.fillRect(0, goalY1, 20, goalHeight);
            ctx.fillStyle = '#e53935';
            ctx.fillRect(canvas.width - 20, goalY1, 20, goalHeight);

            // Отрисовка частиц
            ctx.save();
            for (let i = gameState.particles.length - 1; i >= 0; i--) {
                const p = gameState.particles[i];
                p.x += p.dx;
                p.y += p.dy;
                p.life -= p.decay;
                p.rotation += p.rotSpeed;
                
                if (p.life <= 0) {
                    gameState.particles.splice(i, 1);
                    continue;
                }
                
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation);
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.lineWidth = 1;
                ctx.strokeRect(-p.size / 2, -p.size / 2, p.size, p.size);
                ctx.restore();
            }
            ctx.restore();

            // Щит Исаги
            if (player && player.shieldActive && player.charType === 'Isagi') {
                const goalSide = gameState.playerId === 'player1' ? 0 : canvas.width;
                const goalX = gameState.playerId === 'player1' ? 50 : canvas.width - 50;
                const goalY1 = canvas.height / 2 - 250;
                const goalY2 = canvas.height / 2 + 250;
                
                ctx.save();
                ctx.strokeStyle = '#00ffff';
                ctx.lineWidth = 4;
                ctx.shadowBlur = 25;
                ctx.shadowColor = '#00ffff';
                ctx.globalAlpha = 0.6;
                ctx.beginPath();
                ctx.moveTo(goalX, goalY1);
                ctx.lineTo(goalX, goalY2);
                ctx.stroke();
                
                // Щит полукруг
                ctx.beginPath();
                if (gameState.playerId === 'player1') {
                    ctx.arc(goalX, canvas.height / 2, 120, -Math.PI / 2, Math.PI / 2);
                } else {
                    ctx.arc(goalX, canvas.height / 2, 120, Math.PI / 2, -Math.PI / 2);
                }
                ctx.fillStyle = 'rgba(0, 255, 255, 0.15)';
                ctx.fill();
                ctx.stroke();
                ctx.restore();
            }

            // Боты-вратари
            ctx.fillStyle = gameState.gks.blue.color;
            ctx.beginPath();
            ctx.arc(35, gameState.gks.blue.y, gameState.gks.blue.radius, 0, Math.PI * 2);
            ctx.fill(); ctx.stroke();

            ctx.fillStyle = gameState.gks.red.color;
            ctx.beginPath();
            ctx.arc(canvas.width - 35, gameState.gks.red.y, gameState.gks.red.radius, 0, Math.PI * 2);
            ctx.fill(); ctx.stroke();

            // Игроки
            const now = Date.now();
            for (const [id, player] of Object.entries(gameState.players)) {
                if (!player) continue;

                if (player.auraActive) {
                    ctx.save();
                    ctx.strokeStyle = '#00ffff';
                    ctx.lineWidth = 4;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#00ffff';
                    ctx.beginPath();
                    ctx.arc(player.x, player.y, player.radius + 8, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();
                }

                if (now < player.stunnedUntil) {
                    ctx.strokeStyle = '#ffeb3b';
                    ctx.lineWidth = 3;
                    ctx.setLineDash([6, 6]);
                    ctx.beginPath();
                    ctx.arc(player.x, player.y, player.radius + 12, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }

                ctx.fillStyle = player.color;
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(player.x, player.y);
                ctx.lineTo(player.x + Math.cos(player.angle) * player.radius, player.y + Math.sin(player.angle) * player.radius);
                ctx.stroke();

                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                let cdText = (now < player.cdUntil) ? ` [${Math.ceil((player.cdUntil - now) / 1000)}с]` : '';
                ctx.fillText(CHARACTER_TYPES[player.charType].name + cdText, player.x, player.y - player.radius - 12);

                // Локальные траектории
                if (id === gameState.playerId && player.dribbling && player.auraActive) {
                    if (player.charType === 'Isagi') {
                        ctx.strokeStyle = 'rgba(0, 255, 255, 0.6)';
                        ctx.lineWidth = 3;
                        ctx.setLineDash([8, 8]);
                        ctx.beginPath();
                        ctx.moveTo(player.x, player.y);
                        ctx.lineTo(player.x + Math.cos(player.angle) * 500, player.y + Math.sin(player.angle) * 500);
                        ctx.stroke();
                        ctx.setLineDash([]);
                    } else if (player.charType === 'Rin') {
                        ctx.strokeStyle = 'rgba(233, 30, 99, 0.6)';
                        ctx.lineWidth = 3;
                        ctx.setLineDash([6, 6]);
                        ctx.beginPath();
                        let simX = player.x, simY = player.y;
                        let simDx = Math.cos(player.angle) * 39, simDy = Math.sin(player.angle) * 39;
                        let simCurve = -1.8;
                        ctx.moveTo(simX, simY);
                        for (let i = 0; i < 20; i++) {
                            let angle = Math.atan2(simDy, simDx) + simCurve * 0.03;
                            let speed = Math.hypot(simDx, simDy);
                            simDx = Math.cos(angle) * speed; simDy = Math.sin(angle) * speed;
                            simCurve *= 0.98;
                            simX += simDx; simY += simDy;
                            simDx *= 0.98; simDy *= 0.98;
                            ctx.lineTo(simX, simY);
                        }
                        ctx.stroke();
                        ctx.setLineDash([]);
                    }
                }
            }

            // Мяч
            if (gameState.ball) {
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(gameState.ball.x, gameState.ball.y, gameState.ball.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#111111';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        function gameLoop() {
            if (!gameState.gameStarted) return;

            const myPlayer = gameState.players[gameState.playerId];
            const oppId = gameState.playerId === 'player1' ? 'player2' : 'player1';
            const opponent = gameState.players[oppId];

            updatePlayerPosition(myPlayer);
            
            // Проверка подбора мяча
            checkBallPickup(myPlayer, gameState.playerId);
            checkBallPickup(opponent, oppId);
            
            // Система отбора мяча
            if (myPlayer && opponent) {
                if (opponent.dribbling && !myPlayer.dribbling) {
                    attemptStealBall(myPlayer, opponent, gameState.playerId, oppId);
                }
                if (myPlayer.dribbling && !opponent.dribbling) {
                    attemptStealBall(opponent, myPlayer, oppId, gameState.playerId);
                }
            }

            // Синхронизация удержания
            if (gameState.playerId === 'player1' && opponent && opponent.dribbling) {
                gameState.ball.dribbler = 'player2';
            }
            if (myPlayer && !myPlayer.dribbling && gameState.ball.dribbler === gameState.playerId) {
                gameState.ball.dribbler = null;
            }

            updateBallAndAI();
            draw();

            if (Date.now() - gameState.lastUpdateTime > 45) {
                updateGameState();
                gameState.lastUpdateTime = Date.now();
            }

            requestAnimationFrame(gameLoop);
        }

        initMenu();
    </script>
